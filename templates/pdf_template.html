<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; }
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .footer { margin-top: 50px; font-size: 0.8em; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Radni nalog: {{ nalog.id }}</h1>
        <p>MobiFix Servis - Zagreb</p>
    </div>
    
    <table>
        <tr><th>Klijent:</th><td>{{ klijent.ime_prezime }}</td></tr>
        <tr><th>Uređaj:</th><td>{{ nalog.brand }} {{ nalog.model_uredjaja }}</td></tr>
        <tr><th>Opis kvara:</th><td>{{ nalog.opis_kvara }}</td></tr>
    </table>
    
    <div class="footer">Potpis klijenta: ____________________</div>
</body>
</html>
