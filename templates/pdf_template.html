<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; }
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .info { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Radni nalog: {{ nalog.tracking_token }}</h1>
        <p>Servis: {{ nalog.servis.naziv_obrta }}</p>
    </div>
    <div class="info">
        <p><strong>Klijent:</strong> {{ klijent.ime_prezime }}</p>
        <p><strong>Uređaj:</strong> {{ nalog.brand }} {{ nalog.model_uredjaja }}</p>
        <p><strong>Opis kvara:</strong> {{ nalog.opis_kvara }}</p>
    </div>
    <table>
        <tr><th>Status</th><td>{{ nalog.status }}</td></tr>
        <tr><th>Napomena</th><td>{{ nalog.napomena_servisera }}</td></tr>
    </table>
</body>
</html>
