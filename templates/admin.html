<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobiFix | Admin Panel (Pregled i Uređivanje)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🛠️</span>
                    <span class="text-xl font-bold tracking-tight text-slate-900">MobiFix Admin Panel</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-slate-600 hover:text-blue-600 text-sm font-medium transition">🏠 Početna</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">Popis Aktivnih Naloga</h1>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase tracking-wider">
                            <th class="py-4 px-6 w-16">ID</th>
                            <th class="py-4 px-6">Klijent</th>
                            <th class="py-4 px-6">Uređaj</th>
                            <th class="py-4 px-6">Status</th>
                            <th class="py-4 px-6 text-right w-48">Akcije</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 text-sm">
                        {% for nalog in nalozi %}
                        <tr class="hover:bg-slate-50/80 transition-colors">
                            <td class="py-4 px-6 font-mono text-xs font-bold text-blue-600">#{{ nalog.id }}</td>
                            <td class="py-4 px-6 font-medium text-slate-900">{{ nalog.ime_klijenta }}</td>
                            <td class="py-4 px-6">
                                <span class="bg-slate-100 text-slate-700 px-2 py-1 rounded text-xs font-semibold mr-1">{{ nalog.brand }}</span>
                                {{ nalog.model_uredjaja }}
                            </td>
                            <td class="py-4 px-6">{{ nalog.status }}</td>
                            <td class="py-4 px-6 text-right">
                                <button onclick="otvoriModal('{{ nalog.id }}', '{{ nalog.ime_klijenta }}', '{{ nalog.brand }}', '{{ nalog.model_uredjaja }}', '{{ nalog.opis_kvara | replace('\'', '\\\'') }}', '{{ nalog.status }}', '{{ nalog.ostecen_ekran }}', '{{ nalog.ostecenje_vlagom }}')" 
                                        class="bg-blue-50 text-blue-600 text-xs font-semibold px-3 py-1.5 rounded-lg border border-blue-200 transition">
                                    🔍 Uredi
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="urediModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full p-6">
            <h3 class="text-lg font-bold mb-4">Uređivanje naloga <span id="modalNalogId"></span></h3>
            <form id="modalForma" method="POST" class="space-y-4">
                <input type="text" name="ime_prezime" id="modalIme" class="w-full border p-2 rounded-lg" placeholder="Ime klijenta">
                <input type="text" name="brand" id="modalBrand" class="w-full border p-2 rounded-lg">
                <input type="text" name="model_uredjaja" id="modalModel" class="w-full border p-2 rounded-lg">
                <textarea name="opis_kvara" id="modalOpis" class="w-full border p-2 rounded-lg"></textarea>
                <select name="status" id="modalStatus" class="w-full border p-2 rounded-lg">
                    <option value="zaprimljeno">Zaprimljeno</option>
                    <option value="u_radu">U radu</option>
                    <option value="zavrseno">Završeno</option>
                </select>
                
                <!-- Nova polja za oštećenja -->
                <div class="flex space-x-4 border-t pt-4">
                    <label><input type="checkbox" name="ostecen_ekran" value="1" id="modalEkran"> Oštećen ekran</label>
                    <label><input type="checkbox" name="ostecenje_vlagom" value="1" id="modalVlaga"> Oštećenje vlagom</label>
                </div>

                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="zatvoriModal()" class="px-4 py-2 bg-gray-200 rounded-lg">Odustani</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Spremi</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function otvoriModal(id, ime, brand, model, opis, status, ekran, vlaga) {
            document.getElementById('modalNalogId').innerText = '#' + id;
            document.getElementById('modalIme').value = ime;
            document.getElementById('modalBrand').value = brand;
            document.getElementById('modalModel').value = model;
            document.getElementById('modalOpis').value = opis;
            document.getElementById('modalStatus').value = status;
            
            document.getElementById('modalEkran').checked = (ekran == '1');
            document.getElementById('modalVlaga').checked = (vlaga == '1');
            
            document.getElementById('modalForma').action = '/admin/uredi-nalog/' + id;
            document.getElementById('urediModal').classList.remove('hidden');
        }

        function zatvoriModal() {
            document.getElementById('urediModal').classList.add('hidden');
        }
    </script>
</body>
</html>
