<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobiFix | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🛠️</span>
                    <div>
                        <span class="text-xl font-bold tracking-tight text-slate-900">MobiFix</span>
                    </div>
                </div>
                <a href="/logout" class="text-rose-600 text-sm font-medium px-4 py-2">Odjava</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-lg font-bold text-slate-900 mb-4">Dodaj novi servisni nalog</h2>
            <form action="/dodaj-nalog" method="POST" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <input type="text" name="ime_klijenta" placeholder="Ime i prezime klijenta" class="p-2 border border-slate-200 rounded-lg text-sm" required>
                <input type="text" name="broj_telefona" placeholder="Broj telefona" class="p-2 border border-slate-200 rounded-lg text-sm" required>
                <input type="email" name="email" placeholder="Email klijenta" class="p-2 border border-slate-200 rounded-lg text-sm">
                <input type="text" name="brand" placeholder="Brand" class="p-2 border border-slate-200 rounded-lg text-sm" required>
                <input type="text" name="model_uredjaja" placeholder="Model uređaja" class="p-2 border border-slate-200 rounded-lg text-sm" required>
                <textarea name="opis_kvara" placeholder="Opis kvara..." class="col-span-1 lg:col-span-3 p-2 border border-slate-200 rounded-lg text-sm" required></textarea>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition">Spremi nalog</button>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h2 class="text-base font-bold text-slate-800">Aktivni servisni nalozi</h2>
                <span class="text-xs bg-blue-100 text-blue-700 font-semibold px-2.5 py-1 rounded-full">{{ nalozi|length }}</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="border-b border-slate-200 bg-slate-50/30 text-slate-400 font-semibold uppercase text-xs">
                            <th class="py-3.5 px-6">ID & Token</th>
                            <th class="py-3.5 px-6">Klijent</th>
                            <th class="py-3.5 px-6">Uređaj</th>
                            <th class="py-3.5 px-6">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        {% for nalog in nalozi %}
                        <tr class="hover:bg-slate-50">
                            <td class="py-4 px-6 font-mono text-xs font-bold text-blue-600">#{{ nalog.id }}</td>
                            <td class="py-4 px-6">{{ nalog.ime_klijenta }}</td>
                            <td class="py-4 px-6">{{ nalog.brand }} {{ nalog.model_uredjaja }}</td>
                            <td class="py-4 px-6">
                                <form action="/admin/azuriraj-nalog/{{ nalog.id }}" method="POST">
                                    <select name="status" onchange="this.form.submit()" class="border border-slate-200 rounded p-1 text-xs">
                                        <option value="zaprimljeno" {% if nalog.status == 'zaprimljeno' %}selected{% endif %}>Zaprimljeno</option>
                                        <option value="u_radu" {% if nalog.status == 'u_radu' %}selected{% endif %}>U radu</option>
                                        <option value="zavrseno" {% if nalog.status == 'zavrseno' %}selected{% endif %}>Završeno</option>
                                    </select>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
