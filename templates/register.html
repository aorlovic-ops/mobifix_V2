<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobifix - Registracija Servisa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Mobi<span class="text-blue-600">fix</span></h1>
            <p class="text-slate-500 mt-2">Registrirajte svoj obrt i pokrenite sustav</p>
        </div>

        {% if greska %}
        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-r-lg text-sm" role="alert">
            <p>{{ greska }}</p>
        </div>
        {% endif %}

        <form action="/register" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Naziv obrta / servisa</label>
                <input type="text" name="naziv_obrta" required placeholder="npr. Brzi Popravci d.o.o." 
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Ime i prezime vlasnika</label>
                <input type="text" name="vlasnik_ime" required placeholder="npr. Ante Orlović" 
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">E-mail adresa</label>
                <input type="email" name="email" required placeholder="ime@obrt.hr" 
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Lozinka</label>
                <input type="password" name="lozinka" required placeholder="••••••••" 
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all duration-200 mt-2 cursor-pointer">
                Stvori račun
            </button>
        </form>

        <div class="text-center mt-6 pt-6 border-t border-slate-100 text-sm text-slate-500">
            Već imate račun? <a href="/login" class="text-blue-600 font-medium hover:underline">Prijavite se</a>
        </div>
    </div>

</body>
</html>
