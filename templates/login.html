<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobiFix - Prijava</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 tracking-tight">MobiFix</h1>
            <p class="text-gray-500 text-sm mt-1">Sustav za upravljanje servisom mobitela</p>
        </div>

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email adresa</label>
                <input type="email" name="email" placeholder="primjer@servis.hr" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Lozinka</label>
                <input type="password" name="lozinka" placeholder="••••••••" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition duration-200 mt-6 shadow-sm">
                Prijavi se
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600">
            Nemate račun? 
            <a href="/register" class="text-blue-600 hover:underline font-medium">Registrirajte obrt</a>
        </div>
    </div>

</body>
</html>
